name: release

on:
  push:
    branches: [master]
    tags: ['v*']

permissions:
  contents: write

jobs:
  determine_version:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: ver
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            ver="$(python3 generate_asy_ver_info.py --version-with-git-info)ci"
            echo "version=$ver" >> "$GITHUB_OUTPUT"
          fi

  build-asy-linux:
    needs: determine_version
    uses: ./.github/workflows/build-asy-linux.yml
    with:
      version_override: ${{ needs.determine_version.outputs.version }}

  build-asy-windows:
    needs: determine_version
    uses: ./.github/workflows/build-asy-windows.yml
    with:
      version_override: ${{ needs.determine_version.outputs.version }}

  build-gui:
    needs: determine_version
    uses: ./.github/workflows/build-gui.yml
    with:
      version_override: ${{ needs.determine_version.outputs.version }}

  package-asy-installer-win:
    needs: [build-asy-windows, build-gui, build-asy-linux]
    uses: ./.github/workflows/package-asy-installer-win.yml

  publish-release:
    needs: [build-asy-linux, package-asy-installer-win]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: asymptote-build-linux
          path: release-artifacts

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: asymptote-windows-installer
          path: release-artifacts

      - name: Download Windows zip
        uses: actions/download-artifact@v4
        with:
          name: asymptote-windows-zip
          path: release-artifacts

      - name: Push nightly tag (master only)
        if: github.ref == 'refs/heads/master'
        run: |
          git tag -f nightly
          git push -f origin nightly

      - name: Publish formal release (tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish nightly release (master)
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          prerelease: true
          body: |
            Nightly CI build from `${{ github.sha }}` on branch `master`.
            Version: `${{ needs.determine_version.outputs.version }}`
          files: release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
