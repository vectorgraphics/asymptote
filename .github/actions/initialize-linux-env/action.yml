name: initialize-env
description: Initialize environment
runs:
  using: 'composite'
  steps:
    - name: Update apt
      shell: bash
      run: sudo apt-get update
    - name: Install ninja
      shell: bash
      run: sudo apt-get install ninja-build
    - name: Setup build dependencies
      shell: bash
      run: |
        sudo apt-get install \
          libxinerama-dev libxcursor-dev xorg-dev \
          libglu1-mesa-dev pkg-config libwayland-dev autopoint
        sudo apt-get install ccache
    - name: Set environment variables
      shell: bash
      run: |
        echo VCPKG_ROOT="$VCPKG_INSTALLATION_ROOT" >> "$GITHUB_ENV"
        echo CCACHE_DIR=/home/runner/.ccache >> "$GITHUB_ENV"
        echo CCACHE_TEMP_DIR=/home/runner/.ccache >> "$GITHUB_ENV"
        echo CCACHE_MAXSIZE=1G >> "$GITHUB_ENV"
    - name: Cache Vcpkg
      id: cache-vcpkg
      uses: actions/cache@v4
      with:
        path: /home/runner/.cache/vcpkg/archives
        # Key on the manifest so new/changed dependencies get re-cached; the
        # restore-keys prefix falls back to the most recent compatible cache.
        key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}
        restore-keys: |
          ${{ runner.os }}-vcpkg-
    - name: Cache ccache
      id: cache-ccache
      uses: actions/cache@v4
      with:
        path: /home/runner/.ccache
        # A rolling key (unique per run) forces a cache miss so the freshly
        # populated ccache is always saved; restore-keys restores the newest
        # prior cache. A constant key would only ever save on the first run,
        # leaving the compile cache frozen and increasingly stale.
        key: ${{ runner.os }}-ccache-${{ github.run_id }}
        restore-keys: |
          ${{ runner.os }}-ccache-
